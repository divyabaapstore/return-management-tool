<!DOCTYPE html>
<html>
<head>
    <title>Return Management Tool</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">

    <div class="login-box">

        <h2>Return Management Login</h2>

        <input type="text"
               id="username"
               placeholder="Username">

        <input type="password"
               id="password"
               placeholder="Password">

        <button onclick="login()">Login</button>

        <p id="loginError"></p>

    </div>

</div>


<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="container">

    <div class="filters">

        <select id="categoryFilter">
            <option value="">All Categories</option>
        </select>

        <input type="text"
               id="skuSearch"
               placeholder="BAAP SKU">

        <input type="text"
               id="vendorSkuSearch"
               placeholder="Vendor SKU">

        <select id="vendorFilter">
            <option value="">All Vendors</option>
        </select>

        <select id="stockFilter">
            <option value="">All Stock</option>
            <option value="In Stock">In Stock</option>
            <option value="Out Of Stock">Out Of Stock</option>
        </select>

    </div>

    <div class="summary">

        <div>Total SKU:
            <span id="totalSku">0</span>
        </div>

        <div>Total Instock SKU:
            <span id="instockSku">0</span>
        </div>

        <div>Total Out Of Stock SKU:
            <span id="outstockSku">0</span>
        </div>

    </div>

    <button onclick="exportCSV()">
        Export Filtered CSV
    </button>

    <br><br>

    <table>

        <thead>

        <tr>
            <th>Date</th>
            <th>Product ID</th>
            <th>Image</th>
            <th>BAAP SKU</th>
            <th>Vendor SKU</th>
            <th>Name</th>
            <th>Quantity</th>
            <th>Wholesale Price</th>
            <th>Vendor Price</th>
            <th>MRP</th>
            <th>Vendor</th>
            <th>Vendor ID</th>
            <th>Category</th>
        </tr>

        </thead>

        <tbody id="tableBody"></tbody>

    </table>

    <div class="pagination">

        <button onclick="previousPage()">Previous</button>

        <span id="pageInfo"></span>

        <button onclick="nextPage()">Next</button>

    </div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
