<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Management Tool</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginPage">

    <div class="login-box">

        <h1>Login</h1>

        <p>Sign In to your account</p>

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button onclick="login()">
            Login
        </button>

        <p id="loginError"></p>

    </div>

</div>


<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="container">

    <!-- FILTERS -->
    <div class="filters">

        <select id="categoryFilter">
            <option value="">All Categories</option>
        </select>

        <input
            type="text"
            id="skuSearch"
            placeholder="SKU"
        >

        <input
            type="text"
            id="vendorSkuSearch"
            placeholder="Vendor SKU"
        >

        <select id="vendorFilter">
            <option value="">All Vendor</option>
        </select>

        <select id="stockFilter">
            <option value="">All Stock</option>
            <option value="In Stock">In Stock</option>
            <option value="Out Of Stock">Out Of Stock</option>
        </select>

        <button onclick="applyFilters()">
            Search
        </button>

    </div>

    <!-- SUMMARY -->
    <div class="summary">

        <div>
            Total SKU:
            <span id="totalSku">0</span>
        </div>

        <div>
            Total Instock SKU:
            <span id="instockSku">0</span>
        </div>

        <div>
            Total Out Of Stock SKU:
            <span id="outstockSku">0</span>
        </div>

    </div>

    <!-- EXPORT BUTTON -->
    <div class="export-section">
        <button onclick="exportCSV()">
            Export Filtered CSV
        </button>
    </div>

    <!-- TABLE -->
    <div class="table-container">

        <table>

            <thead>

            <tr>

                <th>Date</th>

                <th>Product ID</th>

                <th>Image</th>

                <th>BAAP SKU</th>

                <th>Vendor SKU</th>

                <th>Name</th>

                <th>Quantity</th>

                <th>Wholesale Price</th>

                <th>Vendor Price</th>

                <th>MRP</th>

                <th>Vendor</th>

                <th>Vendor ID</th>

                <th>Category</th>

            </tr>

            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </div>

    <!-- PAGINATION -->
    <div class="pagination">

        <button onclick="previousPage()">
            Previous
        </button>

        <span id="pageInfo"></span>

        <button onclick="nextPage()">
            Next
        </button>

    </div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
